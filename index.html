<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nexus Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=DM+Sans:ital,wght@0,400;0,500;0,600;1,400&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="glow-top"></div>

    <header>
        <div class="logo"><span>N</span>EXUS</div>
        <div class="search-desktop">
            <span class="search-icon">&#x1F50D;</span>
            <input type="text" id="search-desk" placeholder="Filtrar projetos...">
        </div>
        <button class="search-toggle" id="search-btn">&#x1F50D;</button>
    </header>

    <div class="search-overlay" id="search-overlay">
        <input type="text" id="search-mobile" placeholder="Filtrar projetos..." autofocus>
        <button class="search-close" id="search-close">ESC</button>
    </div>

    <div class="alerts-bar" id="alerts-bar">
        <div class="alerts-summary" id="alerts-toggle">
            <span class="alert-icon">&#x26A0;</span>
            <span id="alerts-count"></span>
        </div>
        <div class="alerts-details" id="alerts-details"></div>
    </div>

    <main class="feed" id="feed">
        <div class="feed-header" id="feed-header">
            <span>Projeto</span>
            <span>Descrição</span>
            <span>Mem</span>
            <span>Links</span>
            <span>Ativ.</span>
        </div>
    </main>

    <script data-cfasync="false" src="js/app.js"></script>
</body>
</html>
