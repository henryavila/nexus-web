<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Finance</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <header>
        <h1>My Finance</h1>
        <nav id="tabs">
            <button class="tab active" data-tab="status">Status</button>
            <button class="tab" data-tab="mes">Mes Atual</button>
            <button class="tab" data-tab="comparativo">Comparativo</button>
            <button class="tab" data-tab="metas">Metas</button>
        </nav>
    </header>
    <main>
        <section id="status" class="tab-content active"></section>
        <section id="mes" class="tab-content"></section>
        <section id="comparativo" class="tab-content"></section>
        <section id="metas" class="tab-content"></section>
    </main>
    <script src="js/app.js"></script>
</body>
</html>
